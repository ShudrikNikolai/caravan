services:
  db:
    image: "postgres:18.3"
    container_name: "db-dev"
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=dbdev
    ports:
      - "5432:5432"

  redis:
    image: "redis:8.8-m03-trixie"
    container_name: "redis-dev"
    ports:
      - "6379:6379"
